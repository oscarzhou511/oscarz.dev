name: Refresh Fuel Data

on:
  schedule:
    # Runs every 6 hours (at minute 0 of 0, 6, 12, 18)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows you to run it manually from the "Actions" tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Important: allows the bot to push files back to your repo

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: pip install requests

    - name: Run update script
      run: python fuel/update_svgs.py

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add *.svg
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update fuel cycle SVGs" && git push)
