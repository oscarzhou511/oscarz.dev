name: Refresh Fuel Data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: pip install requests

    - name: Run update script
      # This tells GitHub to run the command INSIDE the fuel folder
      working-directory: fuel 
      run: python update_svgs.py

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        # Add SVGs from the fuel directory
        git add fuel/*.svg
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update fuel cycle SVGs" && git push)
